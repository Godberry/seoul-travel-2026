name: Deploy Next.js site to Pages

on:
  # 當程式碼推送到 main 分支時觸發
  push:
    branches: ["main"]

  # 允許從 Actions 頁籤手動觸發此工作流程
  workflow_dispatch:

# 設定 GITHUB_TOKEN 的權限，以允許部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 確保不會有兩個部署同時進行，避免衝突
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 建置作業
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          
      - name: Install dependencies
        run: npm ci

      - name: Build with Next.js
        # 將 Next.js 專案打包為靜態檔案
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  # 部署作業
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
